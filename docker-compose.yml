services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-email-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - EMAIL_MODE=${EMAIL_MODE:-mock}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - AGENT_PORT=3001
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-120000}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001  # Pass as build arg
    container_name: ai-email-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge